<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Login Biblioteca</title>

    <link rel="stylesheet" href="PCss/login.css">

</head>

<body>


    <a href="index.html" class="volver">

        ← Regresar

    </a>

    <div class="contenedor-login">


        <div class="card-login">

            <h1>Iniciar Sesión</h1>

            <form id="formLogin">

    <input
        type="email"
        id="correoLogin"
        placeholder="Correo electrónico"
        required>

    <input
        type="password"
        id="passwordLogin"
        placeholder="Contraseña"
        required>

    <button type="submit">

        Entrar

    </button>



            </form>

        </div>

        <div class="card-login">

            <h1>Registrarse</h1>

            <form id="formRegistro">

    <input
        type="text"
        id="nombreRegistro"
        placeholder="Nombre completo"
        required>

    <input
        type="email"
        id="correoRegistro"
        placeholder="Correo electrónico"
        required>

    <input
        type="password"
        id="passwordRegistro"
        placeholder="Crear contraseña"
        required>

    <button type="submit">

        Crear cuenta

    </button>

</form>

        </div>

    </div>
    <script src="./login.js"></script>

</body>

</html>
